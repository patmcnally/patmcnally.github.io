<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>???</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background-color: #6fa430;
      background-image: url('grass_tile.png');
      background-repeat: repeat;
      background-size: 128px 128px;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const FRAME_SIZE = 32;
const SCALE = 4;
const DISPLAY = FRAME_SIZE * SCALE;
const FRAMES = 4;
const FRAME_MS = 200;
const SPEED = 1.2;

const EXPLOSION_FRAMES = 11;
const EXPLOSION_MS = 80;

const DIR = { DOWN: 0, UP: 1, LEFT: 2, RIGHT: 3 };

const characterDefs = [
  { name: 'druid',     walk: 'druid_walk.png',     shadow: 'druid_shadow.png' },
  { name: 'barbarian', walk: 'barbarian_walk.png',  shadow: 'barbarian_shadow.png' },
  { name: 'rogue',     walk: 'rogue_walk.png',      shadow: 'rogue_shadow.png' },
  { name: 'human',     walk: 'human_walk.png',      shadow: 'human_shadow.png' },
  { name: 'orc',       walk: 'orc_walk.png',        shadow: 'orc_shadow.png' },
  { name: 'cow',       walk: 'cow_walk.png',        shadow: 'cow_shadow.png' },
  { name: 'pig',       walk: 'pig_walk.png',        shadow: 'pig_shadow.png' },
  { name: 'rabbit',    walk: 'rabbit_walk.png',     shadow: 'rabbit_shadow.png' },
  { name: 'goat',      walk: 'goat_walk.png',       shadow: 'goat_shadow.png' },
  { name: 'sheep',     walk: 'sheep_walk.png',      shadow: 'sheep_shadow.png' },
  { name: 'donkey',    walk: 'donkey_walk.png',     shadow: 'donkey_shadow.png' },
  { name: 'hound',     walk: 'hound_walk.png',      shadow: 'hound_shadow.png' },
  { name: 'druid2',     walk: 'druid_walk.png',      shadow: 'druid_shadow.png' },
  { name: 'human2',    walk: 'human_walk.png',      shadow: 'human_shadow.png' },
  { name: 'orc2',      walk: 'orc_walk.png',        shadow: 'orc_shadow.png' },
  { name: 'barbarian2', walk: 'barbarian_walk.png', shadow: 'barbarian_shadow.png' },
  { name: 'rogue2',    walk: 'rogue_walk.png',      shadow: 'rogue_shadow.png' },
  { name: 'cow2',      walk: 'cow_walk.png',        shadow: 'cow_shadow.png' },
  { name: 'pig2',      walk: 'pig_walk.png',        shadow: 'pig_shadow.png' },
  { name: 'rabbit2',   walk: 'rabbit_walk.png',     shadow: 'rabbit_shadow.png' },
  { name: 'sheep2',    walk: 'sheep_walk.png',      shadow: 'sheep_shadow.png' },
  { name: 'goat2',     walk: 'goat_walk.png',       shadow: 'goat_shadow.png' },
  { name: 'hound2',    walk: 'hound_walk.png',      shadow: 'hound_shadow.png' },
  { name: 'donkey2',   walk: 'donkey_walk.png',     shadow: 'donkey_shadow.png' },
];

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error(`Failed: ${src}`));
    img.src = src;
  });
}

function randomDir() {
  return [DIR.DOWN, DIR.UP, DIR.LEFT, DIR.RIGHT][Math.floor(Math.random() * 4)];
}

function velocityFromDir(dir) {
  switch (dir) {
    case DIR.DOWN:  return { vx: 0,      vy: SPEED  };
    case DIR.UP:    return { vx: 0,      vy: -SPEED };
    case DIR.LEFT:  return { vx: -SPEED, vy: 0      };
    case DIR.RIGHT: return { vx: SPEED,  vy: 0      };
  }
}

async function main() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const explosionImg = await loadImage('explosion.png');
  const explosions = [];
  // track colliding pairs to avoid re-triggering until they separate
  const collidingPairs = new Set();

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.imageSmoothingEnabled = false;
  }
  resize();
  window.addEventListener('resize', resize);

  const characters = characterDefs.map((def, i) => {
    const angle = (i / characterDefs.length) * Math.PI * 2;
    const cx = canvas.width  / 2 + Math.cos(angle) * 200;
    const cy = canvas.height / 2 + Math.sin(angle) * 150;
    const dir = randomDir();
    const { vx, vy } = velocityFromDir(dir);
    return {
      id: i,
      walkImg:   loadedImages[def.walk],
      shadowImg: loadedImages[def.shadow],
      x: cx, y: cy,
      dir, vx, vy,
      frame: Math.floor(Math.random() * FRAMES),
      frameTimer: 0,
      dirTimer: 0,
      dirInterval: 2000 + Math.random() * 3000,
    };
  });

  let lastTime = null;
  let nextId = characterDefs.length;
  let respawnTimer = 0;

  function spawnCharacter() {
    const def = characterDefs[Math.floor(Math.random() * characterDefs.length)];
    const dir = randomDir();
    const { vx, vy } = velocityFromDir(dir);
    const x = Math.random() * (canvas.width  - DISPLAY);
    const y = Math.random() * (canvas.height - DISPLAY);
    characters.push({
      id: nextId++,
      walkImg:   loadedImages[def.walk],
      shadowImg: loadedImages[def.shadow],
      x, y, dir, vx, vy,
      frame: Math.floor(Math.random() * FRAMES),
      frameTimer: 0,
      dirTimer: 0,
      dirInterval: 2000 + Math.random() * 3000,
    });
  }

  // cache images by src so respawn can reuse them
  const loadedImages = {};
  for (const def of characterDefs) {
    const [w, s] = await Promise.all([loadImage(def.walk), loadImage(def.shadow)]);
    loadedImages[def.walk]   = w;
    loadedImages[def.shadow] = s;
  }

  function loop(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(ts - lastTime, 50);
    lastTime = ts;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // collision detection
    for (let i = 0; i < characters.length; i++) {
      for (let j = i + 1; j < characters.length; j++) {
        const a = characters[i], b = characters[j];
        if (a.dead || b.dead) continue;
        const key = `${Math.min(a.id, b.id)}-${Math.max(a.id, b.id)}`;
        const overlap = a.x < b.x + DISPLAY && a.x + DISPLAY > b.x &&
                        a.y < b.y + DISPLAY && a.y + DISPLAY > b.y;
        if (overlap && !collidingPairs.has(key)) {
          collidingPairs.add(key);
          explosions.push({
            x: (a.x + b.x) / 2,
            y: (a.y + b.y) / 2,
            frame: 0,
            frameTimer: 0,
          });
          a.dead = true;
          b.dead = true;
        } else if (!overlap) {
          collidingPairs.delete(key);
        }
      }
    }

    // remove sprites killed by explosions
    for (let i = characters.length - 1; i >= 0; i--) {
      if (characters[i].dead) characters.splice(i, 1);
    }

    // respawn one character every 2 seconds
    respawnTimer += dt;
    if (respawnTimer >= 2000) {
      respawnTimer -= 2000;
      spawnCharacter();
    }

    // update explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].frameTimer += dt;
      if (explosions[i].frameTimer >= EXPLOSION_MS) {
        explosions[i].frameTimer -= EXPLOSION_MS;
        explosions[i].frame++;
      }
      if (explosions[i].frame >= EXPLOSION_FRAMES) explosions.splice(i, 1);
    }

    for (const char of characters) {
      char.frameTimer += dt;
      if (char.frameTimer >= FRAME_MS) {
        char.frameTimer -= FRAME_MS;
        char.frame = (char.frame + 1) % FRAMES;
      }

      char.dirTimer += dt;
      if (char.dirTimer >= char.dirInterval) {
        char.dirTimer = 0;
        char.dirInterval = 2000 + Math.random() * 3000;
        char.dir = randomDir();
        const v = velocityFromDir(char.dir);
        char.vx = v.vx; char.vy = v.vy;
      }

      char.x += char.vx;
      char.y += char.vy;

      const maxX = canvas.width  - DISPLAY;
      const maxY = canvas.height - DISPLAY;

      if (char.x < 0)    { char.x = 0;    char.dir = DIR.RIGHT; char.vx =  SPEED; char.vy = 0; char.dirTimer = 0; }
      if (char.x > maxX) { char.x = maxX; char.dir = DIR.LEFT;  char.vx = -SPEED; char.vy = 0; char.dirTimer = 0; }
      if (char.y < 0)    { char.y = 0;    char.dir = DIR.DOWN;  char.vx = 0; char.vy =  SPEED; char.dirTimer = 0; }
      if (char.y > maxY) { char.y = maxY; char.dir = DIR.UP;    char.vx = 0; char.vy = -SPEED; char.dirTimer = 0; }

      const sx = char.frame * FRAME_SIZE;
      const sy = char.dir   * FRAME_SIZE;
      const dx = Math.round(char.x);
      const dy = Math.round(char.y);

      ctx.drawImage(char.shadowImg, sx, sy, FRAME_SIZE, FRAME_SIZE, dx, dy, DISPLAY, DISPLAY);
      ctx.drawImage(char.walkImg,   sx, sy, FRAME_SIZE, FRAME_SIZE, dx, dy, DISPLAY, DISPLAY);
    }

    // draw explosions on top
    for (const exp of explosions) {
      ctx.drawImage(
        explosionImg,
        exp.frame * FRAME_SIZE, 0, FRAME_SIZE, FRAME_SIZE,
        Math.round(exp.x), Math.round(exp.y), DISPLAY, DISPLAY
      );
    }

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
}

main().catch(console.error);
</script>
</body>
</html>
